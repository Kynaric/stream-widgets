<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Clip Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
    }
    iframe {
      width: 1920px;
      height: 1080px;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <iframe id="player" allowfullscreen scrolling="no"></iframe>
  <script>
    const params = new URLSearchParams(window.location.search);
    const slug   = params.get('clipId');
    const parent = window.location.hostname || 'localhost';

    if (slug) {
      // player.twitch.tv mit video= statt clips.twitch.tv/embed
      // umgeht das Age-Gate da es der normale VOD-Player ist
      document.getElementById('player').src =
        'https://player.twitch.tv/?video=' + slug +
        '&parent=' + parent +
        '&autoplay=true&muted=false';
    }
  </script>
</body>
</html>
