<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Clip Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
    }
    iframe {
      width: 1920px;
      height: 1080px;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <iframe id="player" allowfullscreen scrolling="no"></iframe>
  <script>
    const params = new URLSearchParams(window.location.search);
    const slug   = params.get('clipId');
    const parent = window.location.hostname || 'localhost';

    if (slug) {
      const frame = document.getElementById('player');
      frame.src =
        'https://clips.twitch.tv/embed?clip=' + slug +
        '&parent=' + parent +
        '&autoplay=true&muted=false';

      // Age-Gate Button automatisch klicken sobald er erscheint
      const interval = setInterval(() => {
        try {
          const doc = frame.contentDocument || frame.contentWindow.document;
          // Twitch Age-Gate Button suchen und klicken
          const btn = doc.querySelector('button[data-a-target="player-overlay-mature-accept"]');
          if (btn) {
            btn.click();
            clearInterval(interval);
          }
        } catch(e) {
          // Cross-origin blockiert direkten Zugriff - anderer Ansatz nötig
        }
      }, 500);
    }
  </script>
</body>
</html>
